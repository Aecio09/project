spring.application.name=03

# Database Configuration (Local Development)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3308/projectdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:projectuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:projectpass}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

#Login Oauth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# Code Verification Service Configuration
code-verification.service.url=${CODE_VERIFICATION_SERVICE_URL:http://localhost:3000}
